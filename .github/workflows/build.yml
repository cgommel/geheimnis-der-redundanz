name: build

# Bei jedem Push und PR: das Buch im Container bauen und das PDF
# als Build-Artefakt hochladen. Damit lassen sich Pull-Requests
# direkt am gerenderten PDF reviewen, ohne lokal die Toolchain zu
# brauchen.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-book:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Buildx einrichten (für Docker-Cache)
        uses: docker/setup-buildx-action@v3

      - name: Container-Image bauen (mit Layer-Cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          tags: redundancy-book:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Buch bauen
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            redundancy-book:ci \
            make

      - name: PDF als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: geheimnis-der-redundanz-pdf
          path: pdf/latex/geheimnis-der-redundanz.pdf
          if-no-files-found: error
